<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login – EngiNotes</title>

<style>
body{
  font-family:Arial;
  background:#f4f6fb;
  padding:20px;
}

.card{
  max-width:350px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

input,button{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  background:#1e3a6d;
  color:#fff;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.small{
  font-size:13px;
  color:#555;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">
  <h3>Login</h3>

  <p class="small">
    Secure login system powered by EngiNotes.<br>
    Your password is encrypted and stored safely.
  </p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()" id="loginBtn">Login</button>
  <button onclick="googleLogin()" id="googleLoginBtn">Signup with Google</button>

</div>

<script>
async function login() {

  const btn = document.getElementById("loginBtn");
  btn.innerText = "Logging in...";
  btn.disabled = true;

  const emailVal = email.value.trim();
  const passwordVal = password.value.trim();

  if (!emailVal || !passwordVal) {
    alert("Please fill all fields");
    resetBtn();
    return;
  }

  try {
    const res = await fetch("http://localhost:5000/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: emailVal,
        password: passwordVal
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert("Wrong credentials " + (data.message || "Login failed"));
      resetBtn();
      return;
    }

    localStorage.setItem("token", data.token);

    alert("Login successful");

    location.href = "index.html";

  } catch (err) {
    alert("Server error");
    resetBtn();
  }

  function resetBtn(){
    btn.innerText = "Login";
    btn.disabled = false;
  }
}

// 🔥 GOOGLE LOGIN
function googleLogin(){
  window.location.href = "http://localhost:5000/auth/google";
}
</script>

</body>
</html>
