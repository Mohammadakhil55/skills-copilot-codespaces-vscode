<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 – Page Not Found | EngiNotes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container{
  background:#fff;
  padding:40px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
  max-width:400px;
}

h1{
  font-size:60px;
  margin:0;
  color:#e74c3c;
}

h2{
  margin:10px 0;
  color:#1e3a6d;
}

p{
  color:#555;
  font-size:14px;
}

a{
  display:inline-block;
  margin-top:20px;
  padding:12px 20px;
  background:#1e3a6d;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
}

a:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  
  <p>
    Oops! The page you're looking for doesn't exist or has been moved.
  </p>

  <a href="index.html">⬅ Back to Home</a>
</div>

</body>
</html>
